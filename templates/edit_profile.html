<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Редактировать профиль</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f0f2f5;
            min-height: 100vh;
            padding: 2rem 1rem;
        }
        .container { max-width: 500px; margin: 0 auto; }
        .back-link {
            display: inline-block;
            color: #65676b;
            text-decoration: none;
            margin-bottom: 1.5rem;
        }
        .form-box {
            background: white;
            border-radius: 16px;
            padding: 2rem;
            box-shadow: 0 2px 12px rgba(0,0,0,0.1);
        }
        h2 { text-align: center; color: #333; margin-bottom: 1.5rem; }
        .avatar-preview {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            object-fit: cover;
            display: block;
            margin: 0 auto 1.5rem;
            border: 3px solid #e1e3e4;
        }
        .form-group { margin-bottom: 1.25rem; }
        label { display: block; margin-bottom: 0.5rem; color: #555; font-weight: 500; }
        input, textarea {
            width: 100%;
            padding: 0.875rem 1rem;
            border: 2px solid #e1e3e4;
            border-radius: 10px;
            font-size: 1rem;
        }
        input:focus, textarea:focus { outline: none; border-color: #0084ff; }
        textarea { min-height: 100px; resize: vertical; }
        .char-count { text-align: right; font-size: 0.8rem; color: #999; margin-top: 0.25rem; }
        .file-input { padding: 0.5rem; border: 2px dashed #e1e3e4; border-radius: 10px; background: #fafbfc; }
        button {
            width: 100%;
            padding: 0.875rem;
            background: #0084ff;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
        }
        button:hover { background: #0073e6; }
        .flash {
            padding: 0.75rem 1rem;
            border-radius: 10px;
            margin-bottom: 1.25rem;
        }
        .flash.success { background: #d4edda; color: #155724; }
        .flash.error { background: #f8d7da; color: #721c24; }
        .status { font-size: 0.9rem; color: #666; margin-top: 0.5rem; }
        .btn-secondary {
            background: #e4e6eb;
            color: #333;
            margin-top: 0.75rem;
            display: block;
            text-align: center;
            text-decoration: none;
            padding: 0.875rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <a href="/" class="back-link">← Назад к чату</a>
        <div class="form-box">
            <h2>✏️ Редактировать профиль</h2>
            {% with messages = get_flashed_messages(with_categories=true) %}
                {% if messages %}
                    {% for category, message in messages %}
                        <div class="flash {{ category }}">{{ message }}</div>
                    {% endfor %}
                {% endif %}
            {% endwith %}
            <img src="{{ user.avatar_url() }}" alt="Avatar" class="avatar-preview" id="avatarPreview">
            <div style="margin-bottom: 1.5rem;">
                <div class="form-group">
                    <label>Новый аватар</label>
                    <input type="file" id="avatarInput" class="file-input" accept="image/*" onchange="uploadAvatar(this)">
                </div>
                <div id="avatarStatus" class="status"></div>
            </div>
            <form method="POST">
                <div class="form-group">
                    <label>О себе</label>
                    <textarea id="bio" name="bio" maxlength="280" oninput="updateCharCount(this)">{{ user.bio }}</textarea>
                    <div class="char-count"><span id="charCount">{{ user.bio|length }}</span>/280</div>
                </div>
                <button type="submit">Сохранить изменения</button>
            </form>
            <a href="/profile/{{ session.get('username') }}" class="btn-secondary">← Вернуться к профилю</a>
        </div>
    </div>
    <script>
        function updateCharCount(textarea) {
            document.getElementById('charCount').textContent = textarea.value.length;
        }
        function uploadAvatar(input) {
            const file = input.files[0];
            if (!file) return;
            const status = document.getElementById('avatarStatus');
            status.textContent = '🔄 Загрузка...';
            const formData = new FormData();
            formData.append('avatar', file);
            fetch('/upload/avatar', {
                method: 'POST',
                body: formData,
                headers: { 'X-Requested-With': 'XMLHttpRequest' }
            })
            .then(r => r.json())
            .then(data => {
                if (data.success) {
                    document.getElementById('avatarPreview').src = data.avatar_url + '?t=' + Date.now();
                    status.textContent = '✅ Аватар обновлён!';
                    status.style.color = '#2ecc71';
                } else {
                    status.textContent = '❌ Ошибка: ' + (data.error || 'Неизвестная');
                    status.style.color = '#e74c3c';
                }
            })
            .catch(err => {
                status.textContent = '❌ Ошибка сети';
                status.style.color = '#e74c3c';
            });
        }
    </script>
</body>
</html>
